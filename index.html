<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RideFix Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* 🔥 FULL BACKGROUND IMAGE */
.top {
  height: 100vh;
  background: url('Picsart_26-04-15_10-54-44-303.jpg') no-repeat center center/cover;
  position: relative;
}

/* DARK OVERLAY (optional but pro look) */
.top::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  top: 0;
  left: 0;
}

/* BOTTOM CARD */
.bottom {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 75vh;
  background: white;
  border-radius: 25px 25px 0 0;
  padding: 20px;
  box-sizing: border-box;

  display: flex;
  justify-content: center;
  align-items: center;

  animation: slideUp 0.9s ease-out forwards;
  animation-delay: 0.9s;
}

@keyframes slideUp {
  to {
    bottom: 0;
  }
}

/* CONTENT */
.content {
  width: 100%;
  max-width: 380px;
}

/* TITLE */
.title {
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 20px;
  text-align: center;
}

/* INPUT */
.input-wrapper {
  display: flex;
  align-items: center;
  border: 2px solid #1db954;
  border-radius: 12px;
  padding: 0 10px;
}

.code {
  font-weight: 600;
  margin-right: 8px;
}

input {
  flex: 1;
  padding: 15px 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: #1db954;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 600;
}

/* TERMS */
.terms {
  font-size: 12px;
  color: gray;
  margin-top: 15px;
  text-align: center;
}

.terms span {
  color: #1db954;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- 🔥 FULL IMAGE BACKGROUND -->
<div class="top"></div>

<!-- CARD -->
<div class="bottom">
  <div class="content">

    <h3 class="title">Enter Your Mobile Number</h3>

    <div class="input-wrapper">
      <span class="code">+91</span>
      <input type="tel" placeholder="Enter mobile number">
    </div>

    <button>Continue</button>

    <p class="terms">
      By clicking, I accept the 
      <span>Terms of Service</span> 
      and 
      <span>Privacy Policy</span>
    </p>

  </div>
</div>

</body>
</html>
