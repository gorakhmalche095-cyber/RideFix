<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideFix Register</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; height: 100vh; overflow: hidden; }
        .top { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh; background: white; border-radius: 30px 30px 0 0; padding: 30px 20px; box-sizing: border-box; z-index: 10; transform: translateY(0); animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .content { width: 100%; max-width: 380px; margin: 0 auto; }
        .title { font-weight: 900; font-size: 22px; margin-bottom: 35px; color: #000; text-align: center; }
        .input-container { border: 2px solid #1db954; border-radius: 15px; padding: 5px 15px; position: relative; display: flex; align-items: center; margin-bottom: 10px; }
        .label-text { position: absolute; top: -12px; left: 20px; background: white; padding: 0 8px; color: #1db954; font-size: 13px; font-weight: 700; }
        input { flex: 1; padding: 15px 0; border: none; outline: none; font-size: 18px; font-weight: 600; background: transparent; width: 100%; color: #000; }
        #otpSection { display: none; }
        .otp-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 15px; text-align: center; font-size: 22px; font-weight: 700; color: #1db954; outline: none; letter-spacing: 5px; }
        .action-area { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 380px; z-index: 20; }
        button { width: 100%; padding: 16px; background: #1db954; border: none; border-radius: 15px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3); }
        button:disabled { background: #ccc; box-shadow: none; }
    </style>
</head>
<body>

<div class="top"></div>

<div class="bottom">
    <div class="content">
        <h3 class="title" id="mainTitle"><b>Enter Your Mobile Number</b></h3>

        <div id="mobileSection">
            <div class="input-container">
                <span class="label-text">Mobile Number</span>
                <span style="font-size: 20px; margin-right: 8px;">🇮🇳</span>
                <span style="font-weight: 700; margin-right: 5px;">+91</span>
                <input type="tel" id="phoneInput" placeholder="Enter number 11" maxlength="10">
            </div>
            <div id="recaptcha-container"></div>
        </div>

        <div id="otpSection">
            <p style="text-align: center; font-size: 14px; color: #555;">Enter 6-digit OTP sent via SMS</p>
            <input type="tel" id="otpInput" class="otp-input" placeholder="000000" maxlength="6">
        </div>
    </div>
</div>

<div class="action-area">
    <button id="mainBtn" onclick="handleAuth()">Continue</button>
</div>

<script>
    // तुमची नवीन पडताळलेली Config
    const firebaseConfig = {
        apiKey: "AIzaSyClcel-N682oF2GZYT6UBcJ_NofMy1rTRA",
        authDomain: "ridefix-real.firebaseapp.com",
        projectId: "ridefix-real",
        storageBucket: "ridefix-real.firebasestorage.app",
        messagingSenderId: "637168003339",
        appId: "1:637168003339:web:1ba1609b96997e3905da0e"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();

    // ReCAPTCHA सेटअप
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    }, auth);

    let confirmationResult;
    let currentState = "MOBILE";

    function handleAuth() {
        const btn = document.getElementById('mainBtn');
        const phoneInput = document.getElementById('phoneInput').value;
        
        if (currentState === "MOBILE") {
            if (phoneInput.length === 10) {
                btn.disabled = true;
                btn.innerText = "Processing...";
                
                const phone = "+91" + phoneInput;
                const appVerifier = window.recaptchaVerifier;

                auth.signInWithPhoneNumber(phone, appVerifier)
                    .then((result) => {
                        confirmationResult = result;
                        document.getElementById('mobileSection').style.display = 'none';
                        document.getElementById('otpSection').style.display = 'block';
                        document.getElementById('mainTitle').innerHTML = "<b>Verify OTP</b>";
                        btn.disabled = false;
                        btn.innerText = "Verify & Login";
                        currentState = "OTP";
                    }).catch((error) => {
                        btn.disabled = false;
                        btn.innerText = "Continue";
                        console.error(error);
                        alert("Error: " + error.message + "\n\nTry opening in Incognito Mode and check if India is 'Allowed' in SMS Settings.");
                    });
            } else {
                alert("Please enter 10 digit number.");
            }
        } else {
            const otp = document.getElementById('otpInput').value;
            if (otp.length === 6) {
                btn.disabled = true;
                btn.innerText = "Verifying...";
                confirmationResult.confirm(otp)
                    .then(() => {
                        alert("Login Success! 🚀");
                        window.location.href = "home.html";
                    }).catch((error) => {
                        btn.disabled = false;
                        btn.innerText = "Verify & Login";
                        alert("Wrong OTP! Try again.");
                    });
            } else {
                alert("Please enter 6 digit OTP.");
            }
        }
    }
</script>

</body>
</html>
