<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RideFix Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background-color: #000;
  height: 100vh;
  overflow: hidden;
}

.top {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') no-repeat center center/cover;
  z-index: 1;
}

.top::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 80vh;
  background: white;
  border-radius: 30px 30px 0 0;
  padding: 30px 20px;
  box-sizing: border-box;
  z-index: 10;
  transform: translateY(100%);
  animation: slideLock 0.6s ease-out forwards;
  animation-delay: 0.3s;
}

@keyframes slideLock {
  to { transform: translateY(0); }
}

.content {
  width: 100%;
  max-width: 380px;
  margin: 0 auto;
}

.title {
  font-weight: 900; 
  font-size: 22px;
  margin-bottom: 35px;
  color: #000;
  text-align: center;
}

.input-container {
  border: 2px solid #1db954;
  border-radius: 15px;
  padding: 5px 15px;
  position: relative;
  display: flex;
  align-items: center;
}

.label-text {
  position: absolute;
  top: -12px;
  left: 20px;
  background: white;
  padding: 0 8px;
  color: #1db954;
  font-size: 13px;
  font-weight: 700;
}

input {
  flex: 1;
  padding: 15px 0;
  border: none;
  outline: none;
  font-size: 18px;
  font-weight: 600;
  background: transparent;
}

.action-area {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 380px;
  z-index: 20;
}

button {
  width: 100%;
  padding: 16px;
  background: #1db954;
  border: none;
  border-radius: 15px;
  color: white;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
}

.terms {
  font-size: 12px;
  color: #777;
  margin-top: 10px;
  text-align: center;
}

.terms a {
  color: #1db954;
  font-weight: 600;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="top"></div>

<div class="bottom">
  <div class="content">
    <h3 class="title"><b>Enter Your Mobile Number</b></h3>

    <div class="input-container">
      <span class="label-text">Mobile Number</span>
      <span style="font-size: 20px; margin-right: 8px;">🇮🇳</span>
      <span style="font-weight: 700; margin-right: 5px;">+91</span>
      <input type="tel" id="phoneInput" placeholder="Enter number" maxlength="10">
    </div>
  </div>
</div>

<div class="action-area" id="footerBtn">
  <button onclick="startOTPProcess()">Continue</button>
  <p class="terms">
    By clicking, I accept the 
    <a href="termsandcondition.html">Terms & Policy</a>
  </p>
</div>

<script type="text/javascript" src="https://verify.msg91.com/otp-provider.js"></script>

<script>
  // MSG91 कॉन्फिगरेशन
  const configuration = {
    widgetId: "36646f747a37303139343833", 
    tokenAuth: "509056AEgmFrgwm2169dff0c3P1",
    exposeMethods: true,
    success: (data) => {
      alert("लॉगिन यशस्वी! ✅");
      window.location.href = "home.html";
    },
    failure: (error) => {
      alert("OTP चुकला किंवा एरर आला: " + JSON.stringify(error));
    }
  };

  // बटन क्लिक केल्यावर काय व्हायला हवे
  function startOTPProcess() {
    const number = document.getElementById('phoneInput').value;
    if(number.length !== 10) {
      alert("कृपया १० अंकी नंबर टाका");
      return;
    }
    
    // MSG91 ला सांगणे की या नंबरवर मेसेज पाठव
    if (window.initSendOTP) {
        window.initSendOTP({
            ...configuration,
            identifier: "91" + number
        });
    } else {
        alert("विज़ेट लोड होत आहे, कृपया थोडा वेळ थांबा.");
    }
  }

  // कीबोर्ड वर आल्यावर बटन वर सरकवण्यासाठी तुझं जुनं लॉजिक
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const footer = document.getElementById('footerBtn');
      const viewportHeight = window.visualViewport.height;
      const windowHeight = window.innerHeight;
      if (viewportHeight < windowHeight) {
        footer.style.bottom = (windowHeight - viewportHeight + 15) + 'px';
      } else {
        footer.style.bottom = '25px';
      }
    });
  }
</script>

</body>
</html>
